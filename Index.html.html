<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Party</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Georgia', serif;
  background: radial-gradient(circle at center, #ffffff, #f7f7f7);
}

/* gold elegant curtain */
.container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.curtain {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(135deg, #d4af37, #f5e6a8, #c9a227);
  box-shadow: inset -20px 0 40px rgba(0,0,0,0.15);
  z-index: 2;
  animation: openCurtain 3s ease forwards;
}

.left { left: 0; }
.right { right: 0; }

@keyframes openCurtain {
  0% { width: 50%; }
  100% { width: 0%; }
}

/* content */
.content {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 1;
}

.text-box {
  opacity: 0;
  animation: fadeIn 2s ease 2.5s forwards;
  background: rgba(255,255,255,0.9);
  padding: 50px 70px;
  border-radius: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

@keyframes fadeIn {
  to { opacity: 1; }
}

h1 {
  font-size: 3em;
  color: #444;
}

h2 {
  font-size: 2em;
  margin-top: 15px;
  color: #777;
}

p {
  margin-top: 20px;
  font-size: 1.2em;
  color: #666;
  line-height: 1.6;
}

.date {
  margin-top: 20px;
  font-size: 1.3em;
  color: #999;
}

.location {
  margin-top: 10px;
  font-size: 1.2em;
  color: #b8962e;
  font-weight: bold;
}

/* floating particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 10s infinite linear;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">

  <div class="curtain left"></div>
  <div class="curtain right"></div>

  <div class="content">
    <div class="text-box">
      <h1>Welcome to our Engagement Party</h1>
      <h2>Hiwa & Lole</h2>

      <p>We are truly happy you could attend our special day.<br>
      Your presence means a lot to us and makes this moment even more beautiful.</p>

      <p>We hope you enjoy and celebrate with us 🤍</p>

      <div class="date">24 / 04 / 2026</div>
      <div class="location">Malta Restaurant</div>
    </div>
  </div>

</div>

<script>
for(let i=0;i<30;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(5+Math.random()*10)+'s';
  document.body.appendChild(p);
}
</script>

</body>
</html>
