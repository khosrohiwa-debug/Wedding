<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f7f5f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Playfair Display', serif;
}

/* Envelope */
.envelope {
  width: 300px;
  height: 200px;
  background: #fff;
  position: relative;
  border-radius: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  cursor: pointer;
  overflow: hidden;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: 0.8s ease;
  z-index: 2;
}

/* Wax seal */
.wax {
  width: 60px;
  height: 60px;
  background: #a67c52;
  border-radius: 50%;
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 20px;
}

/* Card */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  top: 100%;
  transition: 1s ease;
  text-align: center;
  padding: 30px 20px;
  box-sizing: border-box;
}

/* Open animation */
.open .flap {
  transform: rotateX(180deg);
}

.open .card {
  top: 0;
}

/* Text styling */
.title {
  letter-spacing: 2px;
  font-size: 14px;
  color: #777;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 32px;
  margin: 15px 0;
  color: #a67c52;
}

.date {
  margin-bottom: 15px;
  color: #555;
}

.message {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="envelope" onclick="openInvite(this)">
  <div class="flap"></div>
  <div class="wax">♥</div>

  <div class="card">
    <div class="title">WE ARE CELEBRATING</div>

    <div class="names">
      Hiwa Khosro<br>&<br>Lolav Ahmed
    </div>

    <div class="date">April 24, 2026</div>

    <div class="message">
      Thank you for coming<br>
      you made this day more beautiful just by being part of it
    </div>
  </div>
</div>

<script>
function openInvite(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
