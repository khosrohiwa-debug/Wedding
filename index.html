<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiwa & Lolav Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #f8f4ee 0%, #efe8de 45%, #e8decf 100%);
      font-family: 'Cormorant Garamond', serif;
    }

    .scene {
      position: relative;
      width: min(92vw, 430px);
      height: min(86vh, 760px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .invitation-stage {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 620px;
    }

    .card {
      position: absolute;
      left: 50%;
      bottom: 150px;
      width: 88%;
      height: 520px;
      transform: translateX(-50%) translateY(355px);
      transition: transform 1.45s cubic-bezier(.22, 1, .22, 1);
      background: linear-gradient(180deg, #fffefb 0%, #f9f4ea 100%);
      border-radius: 14px;
      box-shadow: 0 28px 60px rgba(91, 67, 35, 0.12);
      border: 1px solid rgba(190, 163, 126, 0.22);
      overflow: hidden;
      z-index: 1;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 52px 28px 34px;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 38%),
        linear-gradient(180deg, #fffefb 0%, #f9f4ea 100%);
      color: #8e6d49;
    }

    .ornament {
      position: absolute;
      top: 16px;
      left: 50%;
      width: 88%;
      height: 150px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .curve {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-top: 1.3px solid rgba(191, 160, 114, 0.95);
      border-radius: 50%;
    }

    .curve.c1 { top: 0; width: 96%; height: 56px; }
    .curve.c2 { top: 8px; width: 83%; height: 74px; }
    .curve.c3 { top: 16px; width: 70%; height: 90px; }
    .curve.c4 { top: 24px; width: 56%; height: 104px; }

    .drop {
      position: absolute;
      top: 10px;
      width: 1px;
      background: rgba(191, 160, 114, 0.88);
    }

    .drop::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(191, 160, 114, 0.95);
    }

    .chandelier {
      position: absolute;
      top: 30px;
      left: 50%;
      width: 110px;
      height: 112px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .chain {
      position: absolute;
      left: 50%;
      top: 0;
      width: 1px;
      height: 18px;
      transform: translateX(-50%);
      background: rgba(191, 160, 114, 0.95);
    }

    .ring1, .ring2, .ring3 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 1.2px solid rgba(191, 160, 114, 0.95);
      border-radius: 50%;
    }

    .ring1 { top: 16px; width: 46px; height: 22px; }
    .ring2 { top: 31px; width: 72px; height: 28px; }
    .ring3 { top: 52px; width: 94px; height: 34px; }

    .crystal {
      position: absolute;
      top: 56px;
      width: 1px;
      background: rgba(191, 160, 114, 0.88);
    }

    .crystal::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      width: 5px;
      height: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(203,177,136,0.92));
      clip-path: polygon(50% 0%, 100% 42%, 70% 100%, 30% 100%, 0% 42%);
    }

    .title {
      margin-top: 132px;
      font-size: 18px;
      letter-spacing: 4px;
      color: #a07e58;
      font-weight: 500;
    }

    .names {
      margin-top: 18px;
      font-family: 'Great Vibes', cursive;
      font-size: 45px;
      line-height: 1.1;
      color: #8a6641;
    }

    .date {
      margin-top: 14px;
      font-size: 21px;
      letter-spacing: 1.5px;
      color: #ab8962;
    }

    .message {
      margin: 32px auto 0;
      max-width: 84%;
      font-size: 24px;
      line-height: 1.35;
      color: #9a7854;
    }

    .envelope {
      position: absolute;
      left: 50%;
      bottom: 120px;
      width: 100%;
      max-width: 390px;
      height: 255px;
      transform: translateX(-50%);
      z-index: 5;
      filter: drop-shadow(0 20px 45px rgba(79, 57, 30, 0.13));
    }

    .envelope-body {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      overflow: hidden;
      background:
        linear-gradient(180deg, #fffefb 0%, #f3ecdf 100%);
      border: 1px solid rgba(190, 163, 126, 0.18);
    }

    .side-left,
    .side-right,
    .bottom-fold {
      position: absolute;
    }

    .side-left,
    .side-right {
      top: 0;
      width: 51%;
      height: 100%;
      background: linear-gradient(180deg, #fefcf8 0%, #f1e8da 100%);
      z-index: 1;
    }

    .side-left {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .side-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .bottom-fold {
      left: 0;
      right: 0;
      bottom: 0;
      height: 72%;
      background: linear-gradient(180deg, #fcfaf5 0%, #eee3d2 100%);
      clip-path: polygon(0 0, 50% 52%, 100% 0, 100% 100%, 0 100%);
      z-index: 2;
      border-top: 1px solid rgba(190, 163, 126, 0.12);
    }

    .top-flap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 58%;
      background: linear-gradient(180deg, #fffdfa 0%, #f2e9dc 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 1.1s ease;
      z-index: 6;
      backface-visibility: hidden;
      box-shadow: inset 0 -1px 0 rgba(190, 163, 126, 0.15);
    }

    .wax {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 78px;
      height: 78px;
      transform: translate(-50%, -4%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, #dfbf9f 0%, #c29266 28%, #97653f 70%, #724726 100%);
      box-shadow:
        0 12px 24px rgba(86, 54, 27, 0.22),
        inset 0 3px 6px rgba(255,255,255,0.24),
        inset 0 -5px 6px rgba(0,0,0,0.18);
      z-index: 8;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.35s ease, transform 0.35s ease;
      user-select: none;
    }

    .wax::before {
      content: "H L";
      font-family: 'Great Vibes', cursive;
      font-size: 30px;
      color: rgba(253, 245, 236, 0.95);
      letter-spacing: 2px;
      transform: translateY(-2px);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 44px;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 22px;
      color: rgba(128, 99, 67, 0.75);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.38; }
      50% { opacity: 1; }
    }

    .opened .top-flap {
      transform: rotateX(180deg);
    }

    .opened .wax {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -4%) scale(0.82);
    }

    .opened .card {
      transform: translateX(-50%) translateY(-60px);
      z-index: 4;
    }

    @media (max-width: 480px) {
      .scene {
        height: 720px;
      }

      .invitation-stage {
        height: 600px;
      }

      .card {
        height: 500px;
      }

      .names {
        font-size: 41px;
      }

      .message {
        font-size: 22px;
      }

      .hint {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="invitation-stage" id="stage">

      <div class="card">
        <div class="card-inner">
          <div class="ornament">
            <div class="curve c1"></div>
            <div class="curve c2"></div>
            <div class="curve c3"></div>
            <div class="curve c4"></div>

            <div class="drop" style="left:8%; height:78px;"></div>
            <div class="drop" style="left:16%; height:88px;"></div>
            <div class="drop" style="left:24%; height:98px;"></div>
            <div class="drop" style="left:32%; height:108px;"></div>
            <div class="drop" style="left:40%; height:118px;"></div>
            <div class="drop" style="left:60%; height:118px;"></div>
            <div class="drop" style="left:68%; height:108px;"></div>
            <div class="drop" style="left:76%; height:98px;"></div>
            <div class="drop" style="left:84%; height:88px;"></div>
            <div class="drop" style="left:92%; height:78px;"></div>
          </div>

          <div class="chandelier">
            <div class="chain"></div>
            <div class="ring1"></div>
            <div class="ring2"></div>
            <div class="ring3"></div>

            <div class="crystal" style="left:20%; height:28px;"></div>
            <div class="crystal" style="left:30%; height:38px;"></div>
            <div class="crystal" style="left:40%; height:48px;"></div>
            <div class="crystal" style="left:50%; height:58px;"></div>
            <div class="crystal" style="left:60%; height:48px;"></div>
            <div class="crystal" style="left:70%; height:38px;"></div>
            <div class="crystal" style="left:80%; height:28px;"></div>
          </div>

          <div class="title">WE ARE CELEBRATING</div>
          <div class="names">Hiwa Khosro<br>&<br>Lolav Ahmed</div>
          <div class="date">24 / 04 / 2026</div>
          <div class="message">
            Thank you for coming<br>
            you made this day more beautiful<br>
            just by being part of it
          </div>
        </div>
      </div>

      <div class="envelope">
        <div class="envelope-body">
          <div class="side-left"></div>
          <div class="side-right"></div>
          <div class="bottom-fold"></div>
          <div class="top-flap"></div>
          <div class="wax" id="wax"></div>
        </div>
      </div>

      <div class="hint">tap the wax seal</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const wax = document.getElementById('wax');

    wax.addEventListener('click', function (e) {
      e.stopPropagation();
      stage.classList.add('opened');
    });
  </script>

</body>
</html>
