<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiwa & Lolav Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, #f8f4ec 0%, #efe7da 50%, #e7dccb 100%);
      font-family: 'Cormorant Garamond', serif;
    }

    .scene {
      position: relative;
      width: min(92vw, 430px);
      height: min(88vh, 780px);
    }

    .stage {
      position: absolute;
      inset: 0;
    }

    /* CARD - hidden at first */
    .card {
      position: absolute;
      left: 50%;
      bottom: 165px;
      width: 84%;
      height: 530px;
      transform: translateX(-50%) translateY(340px);
      opacity: 0;
      transition:
        transform 1.35s cubic-bezier(.22,1,.22,1),
        opacity 0.45s ease;
      background: linear-gradient(180deg, #fffefb 0%, #f8f2e8 100%);
      border-radius: 18px;
      border: 1px solid rgba(198, 168, 126, 0.20);
      box-shadow: 0 28px 60px rgba(83, 60, 31, 0.12);
      overflow: hidden;
      z-index: 1;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 52px 24px 34px;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0) 36%),
        linear-gradient(180deg, #fffefb 0%, #f8f2e8 100%);
    }

    .ornament {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 150px;
      pointer-events: none;
    }

    .arc {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-top: 1.3px solid rgba(195, 164, 118, 0.95);
      border-radius: 50%;
    }

    .arc.a1 { top: 0; width: 96%; height: 54px; }
    .arc.a2 { top: 8px; width: 82%; height: 72px; }
    .arc.a3 { top: 16px; width: 68%; height: 88px; }
    .arc.a4 { top: 24px; width: 54%; height: 102px; }

    .drop {
      position: absolute;
      top: 10px;
      width: 1px;
      background: rgba(195, 164, 118, 0.88);
    }

    .drop::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(195, 164, 118, 0.96);
    }

    .title {
      margin-top: 125px;
      font-size: 18px;
      letter-spacing: 4px;
      color: #a4815b;
    }

    .names {
      margin-top: 18px;
      font-family: 'Great Vibes', cursive;
      font-size: 46px;
      line-height: 1.08;
      color: #8a6641;
    }

    .date {
      margin-top: 16px;
      font-size: 21px;
      letter-spacing: 2px;
      color: #ac8961;
    }

    .message {
      margin: 30px auto 0;
      max-width: 86%;
      font-size: 24px;
      line-height: 1.35;
      color: #9b7854;
    }

    /* ENVELOPE */
    .envelope {
      position: absolute;
      left: 50%;
      bottom: 165px;
      width: 100%;
      max-width: 390px;
      height: 255px;
      transform: translateX(-50%);
      z-index: 5;
      filter: drop-shadow(0 20px 42px rgba(79, 57, 30, 0.14));
    }

    .env-base {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #fffdfa 0%, #f3ebdd 100%);
      border: 1px solid rgba(194, 163, 119, 0.15);
    }

    .env-left,
    .env-right,
    .env-bottom {
      position: absolute;
    }

    .env-left,
    .env-right {
      top: 0;
      width: 51%;
      height: 100%;
      background: linear-gradient(180deg, #fefcf8 0%, #f0e8da 100%);
      z-index: 1;
    }

    .env-left {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .env-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .env-bottom {
      left: 0;
      right: 0;
      bottom: 0;
      height: 72%;
      background: linear-gradient(180deg, #fcfaf5 0%, #eee3d2 100%);
      clip-path: polygon(0 0, 50% 54%, 100% 0, 100% 100%, 0 100%);
      z-index: 2;
      border-top: 1px solid rgba(194, 163, 119, 0.10);
    }

    .env-flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 58%;
      background: linear-gradient(180deg, #fffdfa 0%, #f3eadc 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 1s ease;
      z-index: 6;
      backface-visibility: hidden;
      box-shadow: inset 0 -1px 0 rgba(194, 163, 119, 0.12);
    }

    .wax {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 84px;
      height: 84px;
      transform: translate(-50%, -4%);
      border-radius: 50%;
      z-index: 8;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      background:
        radial-gradient(circle at 30% 30%, #e3c4a5 0%, #c99568 28%, #9a6641 70%, #734726 100%);
      box-shadow:
        0 12px 24px rgba(86, 54, 27, 0.22),
        inset 0 3px 6px rgba(255,255,255,0.24),
        inset 0 -5px 6px rgba(0,0,0,0.18);
      transition:
        opacity 0.35s ease,
        transform 0.35s ease;
    }

    .wax::before {
      content: "HL";
      font-family: 'Great Vibes', cursive;
      font-size: 33px;
      color: rgba(255, 247, 238, 0.96);
      letter-spacing: 1px;
      transform: translateY(-2px);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 22px;
      color: rgba(130, 101, 69, 0.72);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.40; }
      50% { opacity: 1; }
    }

    /* OPEN STATE */
    .opened .env-flap {
      transform: rotateX(180deg);
    }

    .opened .wax {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -4%) scale(0.82);
    }

    .opened .card {
      opacity: 1;
      transform: translateX(-50%) translateY(-20px);
    }

    @media (max-width: 480px) {
      .card {
        height: 500px;
      }

      .names {
        font-size: 41px;
      }

      .message {
        font-size: 22px;
      }

      .hint {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="stage" id="stage">

      <div class="card" id="card">
        <div class="card-inner">
          <div class="ornament">
            <div class="arc a1"></div>
            <div class="arc a2"></div>
            <div class="arc a3"></div>
            <div class="arc a4"></div>

            <div class="drop" style="left:8%; height:74px;"></div>
            <div class="drop" style="left:16%; height:84px;"></div>
            <div class="drop" style="left:24%; height:94px;"></div>
            <div class="drop" style="left:32%; height:104px;"></div>
            <div class="drop" style="left:40%; height:114px;"></div>
            <div class="drop" style="left:60%; height:114px;"></div>
            <div class="drop" style="left:68%; height:104px;"></div>
            <div class="drop" style="left:76%; height:94px;"></div>
            <div class="drop" style="left:84%; height:84px;"></div>
            <div class="drop" style="left:92%; height:74px;"></div>
          </div>

          <div class="title">WE ARE CELEBRATING</div>
          <div class="names">Hiwa Khosro<br>&<br>Lolav Ahmed</div>
          <div class="date">24 / 04 / 2026</div>
          <div class="message">
            Thank you for coming<br>
            you made this day more beautiful<br>
            just by being part of it
          </div>
        </div>
      </div>

      <div class="envelope">
        <div class="env-base">
          <div class="env-left"></div>
          <div class="env-right"></div>
          <div class="env-bottom"></div>
          <div class="env-flap"></div>
          <div class="wax" id="wax"></div>
        </div>
      </div>

      <div class="hint">tap the wax seal</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const wax = document.getElementById('wax');

    wax.addEventListener('click', function (e) {
      e.stopPropagation();
      stage.classList.add('opened');
    });
  </script>

</body>
</html>
