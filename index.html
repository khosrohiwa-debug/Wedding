<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:'Playfair Display', serif;
}

/* ENVELOPE */
.envelope {
  width:320px;
  height:220px;
  position:relative;
  cursor:pointer;
}

/* RED BASE */
.base {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#7a0d12,#b1121b);
  border-radius:8px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* SIDE FOLDS */
.left, .right {
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:linear-gradient(145deg,#8e1117,#c4161f);
}

.left {
  left:0;
  clip-path:polygon(0 0,100% 50%,0 100%);
}

.right {
  right:0;
  clip-path:polygon(100% 0,0 50%,100% 100%);
}

/* TOP FLAP */
.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#9e141b,#d61a25);
  clip-path:polygon(0 0,100% 0,50% 50%);
  transform-origin:top;
  transition:1s;
  z-index:5;
}

/* WAX */
.wax {
  position:absolute;
  width:70px;
  height:70px;
  background:radial-gradient(circle,#5c0b0f,#2e0507);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-20%);
  z-index:6;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-family:'Great Vibes';
  font-size:28px;
}

/* CARD */
.card {
  position:absolute;
  width:90%;
  height:180px;
  background:#fff;
  left:50%;
  bottom:0;
  transform:translateX(-50%) translateY(140px);
  transition:1s;
  text-align:center;
  padding:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* TEXT */
.names {
  font-family:'Great Vibes';
  font-size:28px;
  color:#7a0d12;
  margin:10px 0;
}

/* OPEN */
.open .flap {
  transform:rotateX(180deg);
}

.open .card {
  transform:translateX(-50%) translateY(-60px);
}
</style>
</head>

<body>

<div class="envelope" onclick="openIt(this)">
  <div class="base"></div>
  <div class="left"></div>
  <div class="right"></div>
  <div class="flap"></div>

  <div class="wax">HL</div>

  <div class="card">
    <div>WE ARE CELEBRATING</div>
    <div class="names">Hiwa Khosro<br>&<br>Lolav Ahmed</div>
    <div>24 April 2026</div>
  </div>
</div>

<script>
function openIt(el){
  el.classList.toggle("open");
}
</script>

</body>
</html>
