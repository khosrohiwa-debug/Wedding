<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiwa & Lolav Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
      background:
        radial-gradient(circle at top, #f8f5ef 0%, #efe8dc 45%, #e7dece 100%);
      font-family: 'Cormorant Garamond', serif;
    }

    .scene {
      position: relative;
      width: min(92vw, 430px);
      height: min(88vh, 760px);
    }

    .stage {
      position: absolute;
      inset: 0;
    }

    /* CARD */
    .card {
      position: absolute;
      left: 50%;
      bottom: 165px;
      width: 84%;
      height: 520px;
      transform: translateX(-50%) translateY(170px);
      opacity: 0;
      transition:
        transform 1.35s cubic-bezier(.22,1,.22,1),
        opacity 0.55s ease;
      background: linear-gradient(180deg, #fffefb 0%, #f7f1e7 100%);
      border-radius: 16px;
      border: 1px solid rgba(196, 167, 126, 0.2);
      box-shadow: 0 28px 55px rgba(77, 55, 30, 0.12);
      overflow: hidden;
      z-index: 1;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 54px 26px 34px;
      text-align: center;
      color: #8b6843;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 35%),
        linear-gradient(180deg, #fffefb 0%, #f7f1e7 100%);
    }

    .ornament {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 145px;
      pointer-events: none;
      opacity: 0.95;
    }

    .arc {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-top: 1.3px solid rgba(191, 158, 112, 0.92);
      border-radius: 50%;
    }

    .arc.a1 { top: 0; width: 95%; height: 54px; }
    .arc.a2 { top: 8px; width: 82%; height: 72px; }
    .arc.a3 { top: 16px; width: 68%; height: 88px; }
    .arc.a4 { top: 24px; width: 54%; height: 102px; }

    .drop {
      position: absolute;
      top: 10px;
      width: 1px;
      background: rgba(191, 158, 112, 0.88);
    }

    .drop::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(191, 158, 112, 0.96);
    }

    .chandelier {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: 105px;
      height: 108px;
      pointer-events: none;
    }

    .chain {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 1px;
      height: 18px;
      background: rgba(191, 158, 112, 0.95);
    }

    .ring1, .ring2, .ring3 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 1.2px solid rgba(191, 158, 112, 0.95);
      border-radius: 50%;
    }

    .ring1 { top: 16px; width: 44px; height: 22px; }
    .ring2 { top: 31px; width: 68px; height: 28px; }
    .ring3 { top: 52px; width: 88px; height: 34px; }

    .crystal {
      position: absolute;
      top: 57px;
      width: 1px;
      background: rgba(191, 158, 112, 0.85);
    }

    .crystal::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      width: 5px;
      height: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(203,177,136,0.92));
      clip-path: polygon(50% 0%, 100% 42%, 70% 100%, 30% 100%, 0% 42%);
    }

    .title {
      margin-top: 128px;
      font-size: 18px;
      letter-spacing: 4px;
      color: #a07d57;
    }

    .names {
      margin-top: 18px;
      font-family: 'Great Vibes', cursive;
      font-size: 46px;
      line-height: 1.08;
      color: #896540;
    }

    .date {
      margin-top: 14px;
      font-size: 21px;
      letter-spacing: 1.8px;
      color: #ab8860;
    }

    .message {
      margin: 30px auto 0;
      max-width: 84%;
      font-size: 24px;
      line-height: 1.35;
      color: #9a7753;
    }

    /* ENVELOPE */
    .envelope {
      position: absolute;
      left: 50%;
      bottom: 135px;
      width: 100%;
      max-width: 390px;
      height: 250px;
      transform: translateX(-50%);
      z-index: 5;
      filter: drop-shadow(0 22px 46px rgba(78, 57, 30, 0.14));
    }

    .envelope-base {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, #fffefb 0%, #f2eadc 100%);
      border: 1px solid rgba(189, 160, 119, 0.15);
    }

    .side-left,
    .side-right,
    .bottom-fold {
      position: absolute;
    }

    .side-left,
    .side-right {
      top: 0;
      width: 51%;
      height: 100%;
      background: linear-gradient(180deg, #fefcf8 0%, #f0e7d9 100%);
      z-index: 1;
    }

    .side-left {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .side-right {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .bottom-fold {
      left: 0;
      right: 0;
      bottom: 0;
      height: 72%;
      z-index: 2;
      background: linear-gradient(180deg, #fcfaf5 0%, #ede2d1 100%);
      clip-path: polygon(0 0, 50% 54%, 100% 0, 100% 100%, 0 100%);
      border-top: 1px solid rgba(189, 160, 119, 0.12);
    }

    .top-flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 58%;
      z-index: 6;
      background: linear-gradient(180deg, #fffdfa 0%, #f2e9db 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 1.05s ease;
      backface-visibility: hidden;
      box-shadow: inset 0 -1px 0 rgba(189, 160, 119, 0.12);
    }

    .wax {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 82px;
      height: 82px;
      transform: translate(-50%, -2%);
      border-radius: 50%;
      z-index: 8;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 30% 30%, #e0c1a2 0%, #c59367 28%, #986440 70%, #734726 100%);
      box-shadow:
        0 12px 24px rgba(86, 54, 27, 0.22),
        inset 0 3px 6px rgba(255,255,255,0.24),
        inset 0 -5px 6px rgba(0,0,0,0.18);
      transition:
        opacity 0.35s ease,
        transform 0.35s ease;
    }

    .wax::before {
      content: "H L";
      font-family: 'Great Vibes', cursive;
      font-size: 31px;
      color: rgba(253, 245, 236, 0.96);
      letter-spacing: 2px;
      transform: translateY(-2px);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 62px;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 21px;
      color: rgba(130, 101, 69, 0.75);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.38; }
      50% { opacity: 1; }
    }

    /* OPEN STATE */
    .opened .top-flap {
      transform: rotateX(180deg);
    }

    .opened .wax {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -2%) scale(0.82);
    }

    .opened .card {
      transform: translateX(-50%) translateY(-35px);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .scene {
        height: 720px;
      }

      .card {
        height: 500px;
      }

      .names {
        font-size: 41px;
      }

      .message {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="stage" id="stage">

      <div class="card">
        <div class="card-inner">
          <div class="ornament">
            <div class="arc a1"></div>
            <div class="arc a2"></div>
            <div class="arc a3"></div>
            <div class="arc a4"></div>

            <div class="drop" style="left:8%; height:76px;"></div>
            <div class="drop" style="left:16%; height:86px;"></div>
            <div class="drop" style="left:24%; height:96px;"></div>
            <div class="drop" style="left:32%; height:106px;"></div>
            <div class="drop" style="left:40%; height:116px;"></div>
            <div class="drop" style="left:60%; height:116px;"></div>
            <div class="drop" style="left:68%; height:106px;"></div>
            <div class="drop" style="left:76%; height:96px;"></div>
            <div class="drop" style="left:84%; height:86px;"></div>
            <div class="drop" style="left:92%; height:76px;"></div>
          </div>

          <div class="chandelier">
            <div class="chain"></div>
            <div class="ring1"></div>
            <div class="ring2"></div>
            <div class="ring3"></div>

            <div class="crystal" style="left:20%; height:26px;"></div>
            <div class="crystal" style="left:30%; height:36px;"></div>
            <div class="crystal" style="left:40%; height:46px;"></div>
            <div class="crystal" style="left:50%; height:56px;"></div>
            <div class="crystal" style="left:60%; height:46px;"></div>
            <div class="crystal" style="left:70%; height:36px;"></div>
            <div class="crystal" style="left:80%; height:26px;"></div>
          </div>

          <div class="title">WE ARE CELEBRATING</div>
          <div class="names">Hiwa Khosro<br>&<br>Lolav Ahmed</div>
          <div class="date">24 / 04 / 2026</div>
          <div class="message">
            Thank you for coming<br>
            you made this day more beautiful<br>
            just by being part of it
          </div>
        </div>
      </div>

      <div class="envelope">
        <div class="envelope-base">
          <div class="side-left"></div>
          <div class="side-right"></div>
          <div class="bottom-fold"></div>
          <div class="top-flap"></div>
          <div class="wax" id="wax"></div>
        </div>
      </div>

      <div class="hint">tap the wax seal</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const wax = document.getElementById('wax');

    wax.addEventListener('click', function (e) {
      e.stopPropagation();
      stage.classList.add('opened');
    });
  </script>

</body>
</html>
