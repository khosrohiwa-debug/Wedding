<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #fdf8f2, #f3ebe1);
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Scene */
.scene {
    perspective: 2000px;
}

/* Card */
.card {
    width: 320px;
    height: 480px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s ease;
    cursor: pointer;
}

/* Open animation */
.card.open {
    transform: rotateY(-160deg);
}

/* Cover */
.cover {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #d4af37, #b8962e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    backface-visibility: hidden;
    border-radius: 14px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

.cover-text h2 {
    font-size: 28px;
    font-weight: normal;
    letter-spacing: 1px;
}

.cover-text p {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}

/* Inside */
.inside {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fffdf8;
    padding: 30px;
    box-sizing: border-box;
    transform: rotateY(180deg);
    backface-visibility: hidden;
    border-radius: 14px;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.05);
    text-align: center;
}

/* Titles */
.inside h1 {
    font-size: 20px;
    color: #a67c2d;
    margin-top: 10px;
}

.inside h2 {
    font-size: 28px;
    margin: 10px 0;
}

.inside h3 {
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #b8962e;
    margin-bottom: 10px;
}

/* Rings */
.rings {
    font-size: 34px;
    margin: 15px 0;
}

/* Message */
.message {
    font-size: 20px;
    line-height: 1.8;
    color: #6e5a2b;
    max-width: 260px;
    margin: 30px auto;
    letter-spacing: 0.4px;
}

.message::before,
.message::after {
    content: "";
    display: block;
    height: 1px;
    width: 40px;
    background: #c9a252;
    margin: 15px auto;
}

/* Smooth open text fade */
.inside-content {
    opacity: 0;
    transform: translateY(10px);
    transition: 0.8s ease;
}

.card.open .inside-content {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" onclick="this.classList.toggle('open')">

        <!-- COVER -->
        <div class="cover">
            <div class="cover-text">
                <h2>Wedding Invitation</h2>
                <p>Tap to Open</p>
            </div>
        </div>

        <!-- INSIDE -->
        <div class="inside">
            <div class="inside-content">
                <h1>Welcome to</h1>
                <h2>Our Engagement</h2>
                <h3>Hiwa & Lolav</h3>

                <div class="rings">💍💍</div>

                <p class="message">
                We’re so happy to celebrate our special day with you.<br><br>
                Your presence means everything to us.
                </p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
