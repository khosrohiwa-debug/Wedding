<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Party</title>

<!-- Elegant cursive font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(180deg, #fffdf8, #f5efe4);
}

/* INTRO SCREEN */
.intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255, 252, 245, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  flex-direction: column;
}

.intro h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
  color: #bfa15a;
  margin-bottom: 20px;
}

.intro button {
  padding: 14px 34px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #d4af37, #bfa15a);
  color: white;
  cursor: pointer;
}

/* CURTAIN */
.curtain {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(180deg, #d4af37, #bfa15a, #a8893f);
  transition: transform 1.8s ease-in-out;
  z-index: 5;
}

.left {
  left: 0;
}

.right {
  right: 0;
}

/* OPEN ANIMATION */
.open .left {
  transform: translateX(-100%);
}
.open .right {
  transform: translateX(100%);
}

/* CONTENT */
.content {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.9);
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
}

/* BIG CURSIVE TITLE */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
  color: #bfa15a;
  margin: 0;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 46px;
  margin: 20px 0;
}

p {
  font-size: 18px;
  margin: 10px 0;
}

/* sparkles */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 6s infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0.3; }
  50% { opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>Welcome</h1>
  <button onclick="start()">Tap to Enter</button>
</div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="content">
  <div class="card">
    <h1>Welcome to Our Engagement</h1>
    <div class="names">Hiwa & Lolav</div>
    <p>We are truly happy you could attend our special day</p>
    <p>We hope you enjoy every moment with us</p>
    <p><strong>Date:</strong> 24/04/2026</p>
    <p><strong>Location:</strong> Malta Restaurant</p>
  </div>
</div>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.body.classList.add("open");

  // sparkles
  for(let i=0;i<20;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
